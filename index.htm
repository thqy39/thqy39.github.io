<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Home page of thqy39</title>
    <link rel="stylesheet" type="text/css" href="assets/css/main.css"/>
</head>

<body>
<div class="vi">
    <div class="sidebar">
        <div class="header">
            <h1>箫声远</h1>
            <div class="quote">
                <p class="quote-text animate-init">知之真切笃实处即是行，行之明觉精察处即是知。</p>
                <p class="quote-author animate-init">《传习录》—— <strong>王阳明</strong></p>
            </div>
        </div>
        <div class="menu">
            <a href="https://github.com/thqy39" class="animate-init">GitHub</a>
            <a href="https://www.cnblogs.com/thqy39/" class="animate-init">Blog</a>
            <!--<a href="https://thqy39.github.io/resume" class="animate-init">Resume</a>-->
            <a href="https://www.instagram.com/94tianyuan/" class="animate-init">Instagram</a>
            <a href="https://twitter.com/451323138" class="animate-init">Twitter</a>
            <!-- <a href="http://douban.com/people/iissnan" class="animate-init">DouBan</a> -->
            <!-- <a href="http://weibo.com/iissnan" class="animate-init">WeiBo</a> -->
            <!-- <p>
                <a href="http://dudu.zhihu.com/circle/257517" class="animate-init">
                    奥义·复制粘贴加调试
                </a>
            </p> -->
        </div>
        <div class="location">
            <i class="location-icon"></i>
            <span class="location-text animate-init">Xi'an - China</span>
        </div>
        <div class="relocating">
            Navigating to: <span class="relocate-location"></span>...
        </div>
    </div>

    <div class="content">
        <span class="close">close</span>
    </div>
</div>
<script type="text/javascript" src="assets/vendors/jquery/index.js"></script>
<script>
    $(document).ready(function () {
        var delay = 1;
        var DELAY_STEP = 200;
        var animationOptions = { opacity: 1, top: 0};

        $('h1').animate(animationOptions).promise()
                .pipe(animateMain)
                .pipe(animateLocationIcon);

        function animateMain() {
            var dfd = $.Deferred();
            var els = $('.animate-init');
            var size = els.size();

            els.each(function (index, el) {
                delay++;
                $(el).delay(index * DELAY_STEP)
                        .animate(animationOptions);
                (size - 1 === index) && dfd.resolve();
            });
            return dfd.promise();
        }

        function animateLocationIcon() {
            $('.location-icon').delay(delay * DELAY_STEP).animate({
                opacity: 1,
                top: 0
            }).promise().done(animationQuote);
        }

        function animationQuote() {}

        $(document.body).on('keydown', function (event) {
            // Press 'b' key
            if (event.which === 66) {
                $('.relocate-location').text('Bookmark Page');
                $('.relocating').css('opacity', 1);

                window.setTimeout(function () {
                    window.location.href = '/bookmarks.html';
                }, 1000);
            }
        });
    });
</script>
</body>
</html>
